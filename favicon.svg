<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- background circle -->
  <rect width="32" height="32" rx="7" fill="#1a0a2e"/>

  <!-- horns: left pair -->
  <rect x="3" y="1" width="2" height="6" fill="#7730cc"/>
  <rect x="2" y="2" width="2" height="4" fill="#7730cc"/>
  <!-- horn: center -->
  <rect x="15" y="0" width="2" height="5" fill="#7730cc"/>
  <!-- horns: right pair -->
  <rect x="27" y="1" width="2" height="6" fill="#7730cc"/>
  <rect x="28" y="2" width="2" height="4" fill="#7730cc"/>

  <!-- head -->
  <rect x="3" y="6" width="26" height="12" fill="#3d1a66"/>
  <rect x="1" y="8" width="3" height="8"  fill="#3d1a66"/>
  <rect x="28" y="8" width="3" height="8" fill="#3d1a66"/>

  <!-- left eye (red) -->
  <rect x="5"  y="9"  width="5" height="5" fill="#dc2626"/>
  <rect x="7"  y="10" width="2" height="3" fill="#000"/>
  <rect x="8"  y="11" width="1" height="1" fill="#fff" opacity="0.8"/>

  <!-- center eye (yellow / big) -->
  <rect x="13" y="8"  width="6" height="6" fill="#ffd700"/>
  <rect x="15" y="9"  width="2" height="4" fill="#000"/>
  <rect x="16" y="10" width="1" height="1" fill="#fff" opacity="0.8"/>

  <!-- right eye (red) -->
  <rect x="22" y="9"  width="5" height="5" fill="#dc2626"/>
  <rect x="23" y="10" width="2" height="3" fill="#000"/>
  <rect x="24" y="11" width="1" height="1" fill="#fff" opacity="0.8"/>

  <!-- mouth -->
  <rect x="6"  y="16" width="20" height="3" fill="#000"/>
  <!-- teeth -->
  <rect x="8"  y="15" width="2" height="2" fill="#e5e7eb"/>
  <rect x="13" y="15" width="2" height="2" fill="#e5e7eb"/>
  <rect x="18" y="15" width="2" height="2" fill="#e5e7eb"/>
  <rect x="23" y="15" width="2" height="2" fill="#e5e7eb"/>
  <!-- drool -->
  <rect x="15" y="19" width="2" height="3" fill="#4ade80" opacity="0.75"/>

  <!-- body -->
  <rect x="5"  y="19" width="22" height="10" fill="#3d1a66"/>
  <rect x="2"  y="20" width="4"  height="8"  fill="#3d1a66"/>
  <rect x="26" y="20" width="4"  height="8"  fill="#3d1a66"/>
  <!-- belly rune -->
  <rect x="14" y="21" width="4" height="6" fill="#7f1d1d" opacity="0.6"/>
  <rect x="15" y="21" width="2" height="6" fill="#dc2626" opacity="0.5"/>
  <rect x="14" y="23" width="4" height="2" fill="#dc2626" opacity="0.5"/>

  <!-- claws left -->
  <rect x="1" y="19" width="2" height="3" fill="#7730cc"/>
  <rect x="0" y="20" width="2" height="2" fill="#7730cc"/>
  <!-- claws right -->
  <rect x="29" y="19" width="2" height="3" fill="#7730cc"/>
  <rect x="30" y="20" width="2" height="2" fill="#7730cc"/>

  <!-- tail tip -->
  <rect x="28" y="27" width="3" height="2" fill="#7730cc"/>
  <rect x="30" y="25" width="2" height="3" fill="#dc2626"/>
</svg>
